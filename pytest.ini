[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    unit: unit tests
    integration: integration tests
    slow: slow tests
    external: requires external command-line tools
    meme: requires MEME Suite
    bamm: requires BaMMmotif
    jstacs: requires Jstacs jars and Java
    fullrun: runs the full de novo pipeline
